    <script>
        const storyData = {
            center: { title: "Gautama Buddha", desc: "The central figure of enlightenment." },
            scene1: { title: "The Two Merchants", desc: "Two merchants prepare to cross a vast, dangerous desert with their caravans. One is wise (the Bodhisatta), the other foolish." },
            scene2: { title: "The Fool's Journey", desc: "The foolish merchant departs first. He meets demons disguised as travelers who tell him there is water ahead." },

            scene4: { title: "The Tragic End", desc: "Without water, the foolish merchant's caravan perishes in the desert and is eaten by the demons." },
